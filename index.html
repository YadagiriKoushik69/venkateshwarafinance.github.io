<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Business | Official Page</title>
    <style>
        :root {
            --primary: #075e54; /* WhatsApp Green */
            --insta: #e1306c; /* Instagram Pink */
            --google: #4285f4; /* Google Blue */
            --dark: #1a1a1a;
        }
        body { font-family: 'Arial', sans-serif; margin: 0; padding: 0; background: #f9f9f9; color: var(--dark); line-height: 1.6; }
        header { background: var(--dark); color: white; padding: 40px 20px; text-align: center; }
        
        .section { max-width: 900px; margin: 20px auto; padding: 20px; background: white; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
        h2 { border-bottom: 2px solid #eee; padding-bottom: 10px; }

        /* Gallery Grid */
        .gallery { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 15px; margin: 20px 0; }
        .gallery img { width: 100%; height: 200px; object-fit: cover; border-radius: 8px; }

        /* Video Styling */
        .video-container { position: relative; padding-bottom: 56.25%; height: 0; overflow: hidden; border-radius: 12px; margin: 20px 0; }
        .video-container iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: none; }

        /* Button Group */
        .links { display: flex; flex-direction: column; gap: 15px; margin-top: 30px; }
        .btn { display: block; text-align: center; padding: 15px; border-radius: 8px; text-decoration: none; color: white; font-weight: bold; font-size: 1.1rem; transition: transform 0.2s; }
        .btn:hover { transform: scale(1.02); }
        
        .whatsapp { background: var(--primary); }
        .instagram { background: var(--insta); }
        .googleform { background: var(--google); }

        footer { text-align: center; padding: 40px; color: #888; font-size: 0.8rem; }
    </style>
</head>
<body>

<header>
    <h1>Business Name</h1>
    <p>Premium Services & Quality Products</p>
</header>

<div class="section">
    <h2>Our Gallery</h2>
    <div class="gallery">
        <img src="https://via.placeholder.com/400x300?text=Product+1" alt="Business Image 1">
        <img src="https://via.placeholder.com/400x300?text=Product+2" alt="Business Image 2">
        <img src="https://via.placeholder.com/400x300?text=Product+3" alt="Business Image 3">
    </div>

    <h2>Watch Our Promo</h2>
    <div class="video-container">
        <iframe src="https://www.youtube.com/embed/dQw4w9WgXcQ" allowfullscreen></iframe>
    </div>
</div>

<div class="section">
    <h2>Connect With Us</h2>
    <div class="links">
        <a href="https://wa.me/9182101104" class="btn whatsapp">Chat on WhatsApp</a>
        <a href="https://www.instagram.com/yadagirikoushik?igsh=MTMwcjJxM2llMGVjNA==" class="btn instagram">Follow on Instagram</a>
        <a href="https://forms.gle/2hyEh8iSL7tRxgsg6" class="btn googleform">Fill Our Inquiry Form</a>
    </div>
</div>

<footer>
    <p>&copy; 2026 Your Business Name. Hosted for free on GitHub Pages.</p>
</footer>

</body>
</html>
